# ─────────────────────────────────────────────────────────────────────────────
# COMPSCI 426 — Team Project compose.yml
#
# This file defines the Holmes investigation container and a shared network.
# Add your own services below the "Add your services here" section.
#
# Every service you add must be attached to `team-net` so it is reachable
# from holmes by service name.
#
# Quick reference:
#   Start everything:          docker compose up --build
#   Open a shell in holmes:    docker compose exec holmes bash
#   View logs:                 docker compose logs -f
#   Check health:              docker compose ps
# ─────────────────────────────────────────────────────────────────────────────

networks:
  team-net:
    driver: bridge

services:

  # ── Holmes — System Investigation Container ────────────────────────────────
  # A persistent container with curl, wget, jq, k6, psql, redis-cli, Node,
  # Python, bat, lsd, fd, ripgrep, Neovim + LazyVim, and more.
  #
  # Use it to inspect and test your services from inside the Docker network:
  #
  #   docker compose exec holmes bash
  #   curl http://order-service:3000/health | jq .
  #   psql postgres://user:pass@postgres:5432/mydb
  #   redis-cli -h redis ping
  #   k6 run /workspace/k6/sprint-1.js
  #
  # Your repo root is mounted at /workspace, so all k6 scripts and files
  # are accessible without copying them into the container.
  #
  # See holmes/README.md for a full tool reference.
  holmes:
    build:
      context: ./holmes
      dockerfile: Dockerfile
    container_name: holmes
    restart: unless-stopped
    volumes:
      - .:/workspace
    networks:
      - team-net
    environment:
      - TERM=xterm-256color
    # Holmes has no ports — access it via: docker compose exec holmes bash

  # ── Services ─────────────────────────────────────────────────

  order-service:
    build: ./order
    container_name: order-service
    restart: unless-stopped
    ports:
      - "3001:3001"
    networks:
      - team-net
    environment:
      PORT: 3001
      SERVICE_NAME: order-service
      DATABASE_URL: postgres://user:pass@order-db:5432/orderdb
      REDIS_URL: redis://redis:6379
    depends_on:
      order-db:
        condition: service_healthy
      redis:
        condition: service_healthy
      driver-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
  driver-service:
    build: ./driver
    container_name: driver-service
    restart: unless-stopped
    ports:
      - "3002:3002"
    networks:
      - team-net
    environment:
      PORT: 3002
      SERVICE_NAME: driver-service
      DATABASE_URL: postgres://user:pass@driver-db:5432/driverdb
      REDIS_URL: redis://redis:6379
    depends_on:
      driver-db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3002/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  restaurant-service:
    build: ./restaurant
    container_name: restaurant-service
    restart: unless-stopped
    ports:
      - "3003:3003"
    networks:
      - team-net
    environment:
      PORT: 3003
      SERVICE_NAME: restaurant-service
      DATABASE_URL: postgres://user:pass@restaurant-db:5432/restaurantdb
      REDIS_URL: redis://redis:6379
    depends_on:
      driver-db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3003/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  rating-service:
    build: ./rating
    container_name: rating-service
    restart: unless-stopped
    ports:
      - "3004:3004"
    networks:
      - team-net
    environment:
      PORT: 3004
      SERVICE_NAME: rating-service
      DATABASE_URL: postgres://user:pass@rating-db:5432/ratingdb
      REDIS_URL: redis://redis:6379
      ORDER_SERVICE_URL: http://order-service:3001
    depends_on:
      rating-db:
        condition: service_healthy
      redis:
        condition: service_healthy
      order-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3004/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  surge-pricing-worker:
    build: ./surge
    container_name: surge-pricing-worker
    restart: unless-stopped
    ports:
      - "3005:3005"
    networks:
      - team-net
    environment:
      PORT: 3005
      SERVICE_NAME: surge-pricing-worker
      DATABASE_URL: postgres://user:pass@pricing-db:5432/pricingdb
      REDIS_URL: redis://redis:6379
      QUEUE_NAME: orders:volume
      SURGE_CHANNEL: surge:active
      SURGE_THRESHOLD: "10"
      SURGE_MULTIPLIER: "1.5"
      SURGE_DURATION_SECONDS: "300"
    depends_on:
      pricing-db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3005/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s


  # ── Postgres DB's  ──────────────────────────────────────────────────────
  order-db:
    image: postgres:16
    container_name: order-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: orderdb
    volumes:
      - order-db:/var/lib/postgresql/data
      - ./order/init:/docker-entrypoint-initdb.d
    networks:
      - team-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d orderdb"]
      interval: 5s
      timeout: 3s
      retries: 5

  driver-db:
    image: postgres:16
    container_name: driver-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: driverdb
    volumes:
      - driver-db:/var/lib/postgresql/data
    networks:
      - team-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d driverdb"]
      interval: 5s
      timeout: 3s
      retries: 5

  restaurant-db:
    image: postgres:16
    container_name: restaurant-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: restaurantdb
    volumes:
      - restaurant-db:/var/lib/postgresql/data
    networks:
      - team-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d restaurantdb"]
      interval: 5s
      timeout: 3s
      retries: 5

  rating-db:
    image: postgres:16
    container_name: rating-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: ratingdb
    volumes:
      - rating-db:/var/lib/postgresql/data
    networks:
      - team-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d ratingdb"]
      interval: 5s
      timeout: 3s
      retries: 5

  pricing-db:
    image: postgres:16
    container_name: pricing-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: pricingdb
    volumes:
      - pricing-db:/var/lib/postgresql/data
    networks:
      - team-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d pricingdb"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Redis template ─────────────────────────────────────────────────────────
  
  redis:
    image: redis:7
    container_name: redis
    restart: unless-stopped
    networks:
      - team-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

# ── Named volumes ──────────────────────────────────────────────────────────────
# Declare a volume for each database here, e.g.:
#
volumes:
  order-db:
  driver-db:
  restaurant-db:
  rating-db:
  pricing-db:


